        // Mathematical rounding logic for single average grades
        const calculateMeanGrade = (sessions, category) => {
            const activeGrades = sessions
                .map(s => s[category]?.grade)
                .filter(Boolean);

            if (activeGrades.length === 0) return null;

            let sum = 0;
            let count = 0;

            activeGrades.forEach(gradeStr => {
                const trimmed = gradeStr.trim();
                if (GRADE_VALUES[trimmed] !== undefined) {
                    sum += GRADE_VALUES[trimmed];
                    count++;
                }
            });

            if (count === 0) return null;

            const mean = sum / count;

            let roundedValue = 100;
            if (mean < 37.5) {
                roundedValue = 25;
            } else if (mean < 62.5) {
                roundedValue = 50;
            } else if (mean < 87.5) {
                roundedValue = 75;
            } else {
                roundedValue = 100;
            }

            return VALUE_TO_GRADE[roundedValue];
        };

                        setJsonError(null);
                    } else {
                        setJsonError('يجب أن يكون المدخل كائن JSON صالح.');
                    }
                } catch (e) {
                    setJsonError(`خطأ في صياغة JSON: ${e.message}`);
                }
            };

            // Reset back to system baseline fallback
            const resetToDefault = () => {
                setCustomConfirm({
                    message: 'هل أنت متأكد من رغبتك في إعادة تعيين البيانات الحالية إلى البيانات الافتراضية؟ سيفقد أي تقدم غير محفوظ بالسحابة.',
                    onConfirm: () => {
                        updateMainData(initialData);
                        setStartDate('2026-06-21');
                        setEndDate('2026-07-02');
                        setSelectedLevel('all');
                        setShowTroubleshooting(false);
                        triggerNotification('تمت إعادة تعيين البيانات بنجاح', 'info');
                    }
                });
            };

            // Inclusive range filter checker
            const isDateInRange = (dateStr) => {
                if (!dateStr) return false;
                return dateStr >= startDate && dateStr <= endDate;
            };

            const getRangeEdgesFromRaw = (raw) => {
                if (typeof raw !== 'string') return null;

                const numbers = (raw.match(/\d+/g) || [])
                    .map(Number)
                    .filter(n => Number.isFinite(n));

                if (numbers.length === 0) return null;

                return {
                    start: Math.min(...numbers),
                    end: Math.max(...numbers)
                };
            };

            const getPagesFromRaw = (raw) => {
                if (typeof raw !== 'string') return 0;

                const pageSet = new Set();
                const parts = raw
                    .split(/[+,،]/)
                    .map(part => part.trim())
                    .filter(Boolean);

                parts.forEach(part => {
                    const rangeMatch = part.match(/^(\d+)\s*[-–]\s*(\d+)$/);
                    if (rangeMatch) {
                        const start = Number(rangeMatch[1]);
                        const end = Number(rangeMatch[2]);

                        if (Number.isFinite(start) && Number.isFinite(end)) {
                            const minPage = Math.min(start, end);
                            const maxPage = Math.max(start, end);
                            for (let page = minPage; page <= maxPage; page += 1) {
                                pageSet.add(page);
                            }
                        }
                        return;
                    }

                    const singleMatch = part.match(/^\d+$/);
                    if (singleMatch) {
                        pageSet.add(Number(part));
                    }
                });

                if (pageSet.size > 0) {
                    return pageSet.size;
                }

                const rawEdges = getRangeEdgesFromRaw(raw);
                if (rawEdges) {
                    return Math.max(0, rawEdges.end - rawEdges.start + 1);
                }

                return 0;
            };

            const getPagesFromSessionItem = (sessionItem) => {
                if (!sessionItem) return 0;

                const start = Number(sessionItem.start);
                const end = Number(sessionItem.end);

                if (Number.isFinite(start) && Number.isFinite(end) && start > 0 && end > 0) {
                    const minPage = Math.min(start, end);
                    const maxPage = Math.max(start, end);
                    return Math.max(0, maxPage - minPage + 1);
                }

                const rawEdges = getRangeEdgesFromRaw(sessionItem.raw);
                if (rawEdges) return getPagesFromRaw(sessionItem.raw);

                const fallbackPages = Number(sessionItem.pages ?? sessionItem.sheetPages ?? 0);
                if (Number.isFinite(fallbackPages) && fallbackPages > 0) {
                    return fallbackPages;
                }

                return 0;
            };

            const getSessionPages = (session, category) => getPagesFromSessionItem(session?.[category]);

            const getReviewPagesForSession = (session) => getSessionPages(session, 'review');

            const getBoundsFromPageSet = (pageSet) => {
                if (!pageSet || pageSet.size === 0) return null;

                let minPage = Infinity;
                let maxPage = -Infinity;

                pageSet.forEach(page => {
                    if (page < minPage) minPage = page;
                    if (page > maxPage) maxPage = page;
                });

                return { start: minPage, end: maxPage };
            };

            const mergeBounds = (currentBounds, incomingBounds) => {
                if (!incomingBounds) return currentBounds;
                if (!currentBounds) return { ...incomingBounds };

                return {
                    start: Math.min(currentBounds.start, incomingBounds.start),
                    end: Math.max(currentBounds.end, incomingBounds.end)
                };
            };

            const formatBounds = (bounds) => {
                if (!bounds) return '---';
                return bounds.start === bounds.end ? `${bounds.start}` : `${bounds.start}-${bounds.end}`;
            };

            const getSessionSplitStatsByIndex = (history = []) => {
                const ordered = history
                    .map((session, idx) => ({ session, idx }))
                    .sort((a, b) => {
                        const dateA = a.session?.date || '';
                        const dateB = b.session?.date || '';
                        if (dateA === dateB) return a.idx - b.idx;
                        return dateA.localeCompare(dateB);
                    });

                const previouslyRecitedAsJadid = new Set();
                const stats = {};

                ordered.forEach(({ session, idx }) => {
                    let jadidPages = 0;
                    let sardPages = 0;
                    let jadidBounds = null;
                    let sardBounds = null;

                    const newBounds = getPageBoundsFromSessionItem(session?.new);
                    if (newBounds) {
                        const jadidPageSet = new Set();
                        const sardPageSet = new Set();

                        for (let page = newBounds.start; page <= newBounds.end; page += 1) {
                            if (isSunday(session?.date) && previouslyRecitedAsJadid.has(page)) {
                                sardPageSet.add(page);
                            } else {
                                jadidPageSet.add(page);
                            }
                        }

                        jadidPages = jadidPageSet.size;
                        sardPages = sardPageSet.size;
                        jadidBounds = getBoundsFromPageSet(jadidPageSet);
                        sardBounds = getBoundsFromPageSet(sardPageSet);

                        jadidPageSet.forEach(page => previouslyRecitedAsJadid.add(page));
                    } else {
                        const fallbackNewPages = getSessionPages(session, 'new');
                        if (isSunday(session?.date)) {
                            sardPages = fallbackNewPages;
                        } else {
                            jadidPages = fallbackNewPages;
                        }
                    }

                    stats[idx] = { jadidPages, sardPages, jadidBounds, sardBounds };
                });

                return stats;
            };

            const getPageBoundsFromSessionItem = (sessionItem) => {
                if (!sessionItem) return null;

                const start = Number(sessionItem.start);
                const end = Number(sessionItem.end);

                if (Number.isFinite(start) && Number.isFinite(end) && start > 0 && end > 0) {
                    return {
                        start: Math.min(start, end),
                        end: Math.max(start, end)
                    };
                }

                const rawEdges = getRangeEdgesFromRaw(sessionItem.raw);
                if (rawEdges) {
                    return rawEdges;
                }

                return null;
            };

            // Calculate student target expectation pages based on official schedule
            const calculateTargetPages = (groupName, start, end) => {
                let targetSum = 0;
                OFFICIAL_RECITATION_DATES.forEach(dateStr => {
                    if (dateStr >= start && dateStr <= end) {
                        if (FIRST_THREE_DATES.includes(dateStr)) {
                            if (groupName === "نخبة١") {
                                targetSum += 2;
                            } else if (groupName === "نخبة٢") {
                                targetSum += 1;
                            }
                        } else {
                            const dateObj = new Date(dateStr);
                            const dayOfWeek = dateObj.getDay(); // 2 is Tuesday, 4 is Thursday
                            if (dayOfWeek === 2 || dayOfWeek === 4) {
                                if (groupName === "نخبة١") {
                                    targetSum += 4;
                                } else if (groupName === "نخبة٢") {
                                    targetSum += 2;
                                }
                            }
                        }
                    }
                });
                return targetSum;
            };

            // Unique categories extracter
            const dynamicGroupsList = useMemo(() => {
                if (!data.students) return [];
                const groups = data.students.map(s => s.group || s.level).filter(Boolean);
                return [...new Set(groups)].sort();
            }, [data.students]);

            const processedStudents = useMemo(() => {
                if (!data.students) return [];

                let list = [...data.students];

                if (searchQuery.trim() !== '') {
                    list = list.filter(student => 
                        student.name.toLowerCase().includes(searchQuery.toLowerCase())
                    );
                }

                if (selectedLevel !== 'all') {
                    list = list.filter(student => (student.group || student.level) === selectedLevel);
                }

                list.sort((a, b) => {
                    if (sortBy === 'name-asc') {
                        return a.name.localeCompare(b.name, 'ar');
                    }
                    if (sortBy === 'name-desc') {
                        return b.name.localeCompare(a.name, 'ar');
                    }
                    if (sortBy === 'pages-desc') {
                        const getNewPagesInRange = (student) => {
                            const history = student.history || [];
                            const splitStats = getSessionSplitStatsByIndex(history);
                            return history.reduce((acc, session, idx) => {
                                if (isDateInRange(session.date)) {
                                    return acc + (splitStats[idx]?.jadidPages || 0);
                                }
                                return acc;
                            }, 0);
                        };
                        return getNewPagesInRange(b) - getNewPagesInRange(a);
                    }
                    return 0;
                });

                return list;
            }, [data.students, searchQuery, selectedLevel, sortBy, startDate, endDate]);

            // Consolidated analytical KPI stats (Filtered)
            const overallMetrics = useMemo(() => {
                let totalNew = 0;
                let totalReview = 0;
                let totalTarget = 0;
                
                processedStudents.forEach(student => {
                    const studentGroup = student.group || student.level || 'نخبة١';
                    totalTarget += calculateTargetPages(studentGroup, startDate, endDate);
                    const history = student.history || [];
                    const splitStats = getSessionSplitStatsByIndex(history);

                    history.forEach((session, idx) => {
                        if (isDateInRange(session.date)) {
                            totalNew += (splitStats[idx]?.jadidPages || 0);
                            totalReview += getReviewPagesForSession(session);
                        }
                    });
                });

                const targetAchieved = totalTarget > 0 ? Math.round((totalNew / totalTarget) * 100) : 0;
                const boundedTarget = Math.min(100, Math.max(0, targetAchieved));

                return {
                    totalNew: totalNew.toFixed(1),
                    totalReview: totalReview.toFixed(1),
                    achievementRate: boundedTarget
                };
            }, [processedStudents, startDate, endDate]);

            const overallWarnings = useMemo(() => {
                const totals = { "حفظ": 0, "إقراء": 0, "سلوك": 0, "غياب": 0 };
                processedStudents.forEach(student => {
                    if (student.warnings) {
                        Object.entries(student.warnings).forEach(([type, count]) => {
                            if (totals[type] !== undefined) totals[type] += (count || 0);
                        });
                    }
                });
                return totals;
            }, [processedStudents]);

            // Role assigners
            const handleRoleLogin = (role) => {
                setCurrentUserRole(role);
                setIsLoggedIn(true);
                setStudentLoginError('');
                setStudentLoginInput('');

                if (role === 'nokhba1') {
                    setSelectedLevel('نخبة١');
                } else if (role === 'nokhba2') {
                    setSelectedLevel('نخبة٢');
                } else {
                    setSelectedLevel('all');
                }

                triggerNotification(`مرحباً بك! تم تسجيل الدخول كـ ${role === 'admin' ? 'مشرف عام' : role === 'nokhba1' ? 'معلم نخبة ١' : 'معلم نخبة ٢'}`, 'success');
            };

            // Intelligent student identity matcher
            const handleStudentNameLoginSubmit = (e) => {
                e.preventDefault();
                setStudentLoginError('');

                const query = studentLoginInput.trim().toLowerCase();
                if (!query) {
                    setStudentLoginError('الرجاء كتابة الاسم للتمكن من الدخول.');
                    return;
                }

                if (query === 'admin') {
                    handleRoleLogin('admin');
                    return;
                }
                if (query === 'nukba1' || query === 'nokhba1' || query === 'نخبة١' || query === 'نخبه١') {
                    handleRoleLogin('nokhba1');
                    return;
                }
                if (query === 'nukba2' || query === 'nokhba2' || query === 'نخبة٢' || query === 'نخبه٢') {
                    handleRoleLogin('nokhba2');
                    return;
                }

                const queryWords = query.split(/\s+/).filter(w => w.length > 0);

                if (queryWords.length === 1) {
                    const singleWord = queryWords[0];

                    const firstNameMatches = data.students.filter(student => {
                        const studentFirstName = student.name.trim().split(/\s+/)[0].toLowerCase();
                        return studentFirstName === singleWord;
                    });

                    if (firstNameMatches.length === 1) {
                        const matched = firstNameMatches[0];
                        setLoggedInStudent(matched);
                        setCurrentUserRole('student');
                        setIsLoggedIn(true);
                        setStudentLoginInput('');
                        setStudentLoginError('');
                        triggerNotification(`مرحباً بك يا ${matched.name} في بوابتك التعليمية 👋`, 'success');
                        return;
                    } else if (firstNameMatches.length > 1) {
                        setStudentLoginError('يوجد أكثر من طالب بهذا الاسم الأول. الرجاء كتابة اسمك الثنائي المعتمد في الحلقة للتمييز بين السجلات.');
                        return;
                    }

                    const fallbackMatches = data.students.filter(student => {
                        return student.name.toLowerCase().includes(singleWord);
                    });

                    if (fallbackMatches.length === 1) {
                        const matched = fallbackMatches[0];
                        setLoggedInStudent(matched);
                        setCurrentUserRole('student');
                        setIsLoggedIn(true);
                        setStudentLoginInput('');
                        setStudentLoginError('');
                        triggerNotification(`مرحباً بك يا ${matched.name} في بوابتك التعليمية 👋`, 'success');
                        return;
                    } else if (fallbackMatches.length > 1) {
                        setStudentLoginError('يوجد أكثر من اسم يطابق هذه الكلمة. الرجاء كتابة الاسم الثنائي بالكامل.');
                        return;
                    } else {
                        setStudentLoginError('لم نتمكن من العثور على اسم الطالب في الحلقة. يرجى التأكد من كتابة الاسم الصحيح بشكل صحيح.');
                        return;
                    }
                }

                const matched = data.students.find(student => {
                    const dbName = student.name.toLowerCase();
                    return queryWords.every(word => dbName.includes(word));
                });

                if (matched) {
                    setLoggedInStudent(matched);
                    setCurrentUserRole('student');
                    setIsLoggedIn(true);
                    setStudentLoginInput('');
                    setStudentLoginError('');
                    triggerNotification(`مرحباً بك يا ${matched.name} في بوابتك التعليمية 👋`, 'success');
                } else {
                    setStudentLoginError('لم نتمكن من العثور على اسم الطالب في الحلقة. يرجى مراجعة الصياغة والتأكد من الاسم الصحيح.');
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserRole(null);
                setLoggedInStudent(null);
                setSelectedStudent(null);
                triggerNotification('تم تسجيل الخروج بنجاح. نتمنى لك يوماً سعيداً!', 'info');
            };

            const handleAddSessionSubmit = (e) => {
                e.preventDefault();
                if (!formStudentId) {
                    alert('الرجاء اختيار الطالب أولاً');
                    return;
                }

                const updatedStudents = data.students.map(student => {
                    if (student.id === parseInt(formStudentId)) {
                        const newRawEdges = getRangeEdgesFromRaw(formNewRaw);
                        const reviewRawEdges = getRangeEdgesFromRaw(formReviewRaw);

                        const newSession = {
                            date: formDate,
                            new: formNewRaw ? {
                                type: "range",
                                raw: formNewRaw,
                                start: newRawEdges?.start || 0,
                                end: newRawEdges?.end || 0,
                                pages: parseFloat(formNewPages) || 1,
                                grade: formNewGrade || null,
                                sheetPages: parseFloat(formNewPages) || 1
                            } : null,
                            review: formReviewRaw ? {
                                type: "range",
                                raw: formReviewRaw,
                                start: reviewRawEdges?.start || 0,
                                end: reviewRawEdges?.end || 0,
                                pages: parseFloat(formReviewPages) || 1,
                                grade: formReviewGrade || null,
                                sheetPages: parseFloat(formReviewPages) || 1
                            } : null
                        };

                        const existingHistory = student.history ? [...student.history] : [];
                        return {
                            ...student,
                            history: [...existingHistory, newSession]
                        };
                    }
                    return student;
                });

                if (formDate > endDate) {
                    setEndDate(formDate);
                }

                updateMainData({
                    ...data,
                    students: updatedStudents
                });

                setFormNewRaw('');
                setFormNewPages('');
                setFormReviewRaw('');
                setFormReviewPages('');
                setShowAddSessionModal(false);
                triggerNotification('تمت إضافة الجلسة بنجاح!');
            };

            const handleAddStudentSubmit = (e) => {
                e.preventDefault();
                if (!newStudentName.trim()) {
                    alert('الرجاء إدخال اسم الطالب');
                    return;
                }

                const nextId = data.students && data.students.length > 0 
                    ? Math.max(...data.students.map(s => s.id)) + 1 
                    : 1;

                const newStudentObj = {
                    id: nextId,
                    name: newStudentName.trim(),
                    group: newStudentGroup,
                    level: newStudentGroup,
                    attendance: 'حضر 1 / 27',
                    history: []
                };

                updateMainData({
                    ...data,
                    students: [...(data.students || []), newStudentObj]
                });

                setNewStudentName('');
                setShowAddStudentModal(false);
                triggerNotification('تم إضافة الطالب الجديد لقائمة المتابعة');
            };

            if (!hasReceivedInitialJson) {
                return (
                    <div className="min-h-screen bg-[#0F172A] text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
                        <div className="absolute bottom-0 left-0 w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-3xl -ml-32 -mb-32"></div>

                        <div className="max-w-md w-full relative z-10">
                            <div className="bg-slate-900 border border-slate-800/80 rounded-[2.5rem] p-8 space-y-6 shadow-2xl text-center">
                                <div className="inline-flex p-3 bg-indigo-600 rounded-3xl text-white shadow-xl shadow-indigo-600/30 select-none">
                                    <RefreshCw size={28} className={`${isLoading ? 'animate-spin' : ''}`} />
                                </div>

                                <div className="space-y-2">
                                    <h2 className="text-2xl font-black text-white leading-tight">جاري تحميل بيانات الحلقة</h2>
                                    <p className="text-xs text-slate-400">ننتظر استلام ملف JSON قبل عرض المنظومة</p>
                                </div>

                                {fetchErrorDetail && (
                                    <div className="p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-right">
                                        <p className="text-xs text-red-200 font-bold">تعذر استلام JSON من المصدر.</p>
                                        <p className="text-[11px] text-red-300/90 mt-1 font-mono break-all" dir="ltr">{fetchErrorDetail}</p>
                                    </div>
                                )}

                                <button
                                    onClick={loadLiveData}
                                    disabled={isLoading}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-800/60 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-xl text-xs transition-all shadow-lg shadow-indigo-900/20 flex items-center justify-center gap-2"
                                >
                                    <RefreshCw size={15} className={`${isLoading ? 'animate-spin' : ''}`} />
                                    <span>{isLoading ? 'جاري المحاولة...' : 'إعادة المحاولة'}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // SUB-VIEW: LOGIN SPLASH SCREEN
            // ==========================================
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#0F172A] text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
                        <div className="absolute bottom-0 left-0 w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-3xl -ml-32 -mb-32"></div>
                        
                        <div className="max-w-md w-full relative z-10">
                            <div className="bg-slate-900 border border-slate-800/80 rounded-[2.5rem] p-8 space-y-6 shadow-2xl">
                                <div className="text-center space-y-3 pb-2">
                                    <div 
                                        className="inline-flex p-3 bg-indigo-600 rounded-3xl text-white shadow-xl shadow-indigo-600/30 select-none"
                                    >
                                        <BookOpen size={28} className="animate-pulse" />
                                    </div>
                                    <h2 className="text-2xl font-black text-white leading-tight">متابعة التسميع والحفظ</h2>
                                    <p className="text-xs text-slate-400">لوحة المتابعة الذكية وجداول قياس الإنجاز لمجموعات النخبة</p>
                                </div>

                                <div className="border-t border-slate-800"></div>

                                <form onSubmit={handleStudentNameLoginSubmit} className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-300 block">اكتب اسمك للوصول المباشر إلى ملف المتابعة:</label>
                                        <div className="relative">
                                            <input 
                                                type="text"
                                                value={studentLoginInput}
                                                onChange={(e) => setStudentLoginInput(e.target.value)}
                                                placeholder="اكتب اسمك هنا للبدء... (مثال: أمير)"
                                                className="w-full pl-4 pr-11 py-3 bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl text-sm font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-white placeholder-slate-600"
                                            />
                                            <User size={18} className="absolute right-4 top-3.5 text-slate-500" />
                                        </div>
                                        
                                        <p className="text-[10px] text-slate-500 font-bold leading-normal">
                                            * يمكنك كتابة اسمك الأول فقط إذا لم يكن مكرراً في الحلقة، أو كتابة الاسم الثنائي (الاسم الأول واللقب) للتمييز الفوري وسرعة تسجيل الدخول.
                                        </p>

                                        {studentLoginError && (
                                            <p className="text-red-400 text-xs font-bold leading-normal mt-2 flex items-start gap-1.5 p-2 bg-red-500/10 border border-red-500/20 rounded-lg animate-bounce">
                                                <AlertTriangle size={14} className="mt-0.5 flex-shrink-0" />
                                                <span>{studentLoginError}</span>
                                            </p>
                                        )}
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all shadow-lg shadow-indigo-900/20 flex items-center justify-center gap-2 mt-2 group"
                                    >
                                        <span>دخول مباشر للمنظومة</span>
                                        <ArrowLeft size={16} className="transform group-hover:-translate-x-1 transition-transform" />
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // SUB-VIEW: PERSONAL STUDENT VIEW 
            // ==========================================
            if (currentUserRole === 'student' && loggedInStudent) {
                const studentGroup = loggedInStudent.group || loggedInStudent.level || '---';
                const studentHistory = loggedInStudent.history || [];
                const studentHistoryWithIndex = studentHistory.map((session, idx) => ({ session, idx }));
                const sessionSplitStats = getSessionSplitStatsByIndex(studentHistory);
                const filteredEntries = studentHistoryWithIndex.filter(({ session }) => isDateInRange(session.date));
                const filteredHistory = filteredEntries.map(({ session }) => session);
                const sundayEntries = filteredEntries.filter(({ session }) => isSunday(session.date));

                const totalNewPages = filteredEntries.reduce((acc, { idx }) => acc + (sessionSplitStats[idx]?.jadidPages || 0), 0);
                const totalReviewPages = filteredHistory.reduce((acc, curr) => acc + getReviewPagesForSession(curr), 0);
                const totalSardNew = sundayEntries.reduce((acc, { idx }) => acc + (sessionSplitStats[idx]?.sardPages || 0), 0);

                // Calculate page range for new memorization
                const newBounds = filteredEntries.reduce(
                    (acc, { idx }) => mergeBounds(acc, sessionSplitStats[idx]?.jadidBounds || null),
                    null
                );

                                                                <div className="absolute right-[-31px] top-1.5 w-4.5 h-4.5 rounded-full bg-indigo-50 border-2 border-indigo-500 flex items-center justify-center">
                                                                    <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>
                                                                </div>

                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-xs font-black text-indigo-600 font-mono bg-indigo-50 px-2.5 py-1 rounded-lg">
                                                                            {session.date}
                                                                        </span>
                                                                        {sunday && (
                                                                            <span className="text-[10px] font-black text-purple-600 bg-purple-50 px-2.5 py-0.5 rounded-full border border-purple-100">
                                                                                جلسة سرد
                                                                            </span>
                                                                        )}
                                                                        {session.attendance && (
                                                                            <span className={`text-[10px] font-black px-2.5 py-0.5 rounded-full border ${
                                                                                session.attendance.present 
                                                                                    ? 'bg-emerald-50 text-emerald-700 border-emerald-100' 
                                                                                    : 'bg-red-50 text-red-700 border-red-100'
                                                                            }`}>
                                                                                {session.attendance.status}
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </div>

                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 bg-slate-50/50 p-3 rounded-2xl border border-slate-100/70">
                                                                    <div className="text-xs">
                                                                        <span className="text-slate-400 block mb-1 font-bold">{sunday ? 'السرد' : 'الحفظ الجديد'}</span>
                                                                        {(sunday ? sessionSardPages > 0 : session.new && sessionJadidPages > 0) ? (
                                                                            <div className="flex justify-between bg-white px-3 py-2 rounded-xl border border-slate-100">
                                                                                <span className="font-bold text-slate-700 font-mono">{sunday ? sessionSardRaw : sessionJadidRaw}</span>
                                                                                <div className="flex items-center gap-1.5">
                                                                                    <span className="bg-purple-50 text-purple-700 border border-purple-100/80 px-2.5 py-1 rounded-lg text-xs font-black font-mono whitespace-nowrap">
                                                                                        {sunday ? sessionSardPages.toFixed(1) : sessionJadidPages.toFixed(1)} ص
                                                                                    </span>
                                                                                    {session.new.grade && (
                                                                                        <span className={`px-2.5 py-1 rounded-lg text-xs font-bold whitespace-nowrap ${getGradePillClass(session.new.grade)}`}>
                                                                                            {session.new.grade}
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                            </div>
                                                                        ) : (
                                                                            <span className="text-slate-400 italic">{sunday ? 'لا يوجد سرد في الجلسة' : 'لم يتم تسجيل حفظ جديد في هذا اليوم'}</span>
                                                                        )}

                                                                        {sunday && sessionJadidPages > 0 && (
                                                                            <div className="mt-2">
                                                                                <span className="text-slate-400 block mb-1 font-bold">الحفظ الجديد</span>
                                                                                <div className="flex justify-between bg-white px-3 py-2 rounded-xl border border-slate-100">
                                                                                    <span className="font-bold text-slate-700 font-mono">{sessionJadidRaw}</span>
                                                                                    <div className="flex items-center gap-1.5">
                                                                                        <span className="bg-purple-50 text-purple-700 border border-purple-100/80 px-2.5 py-1 rounded-lg text-xs font-black font-mono whitespace-nowrap">
                                                                                            {sessionJadidPages.toFixed(1)} ص
                                                                                        </span>
                                                                                        {session.new?.grade && (
                                                                                            <span className={`px-2.5 py-1 rounded-lg text-xs font-bold whitespace-nowrap ${getGradePillClass(session.new.grade)}`}>
                                                                                                {session.new.grade}
                                                                                            </span>
                                                                                        )}
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                    </div>

                                                                    <div className="text-xs">
                                                                        <span className="text-slate-400 block mb-1 font-bold">المراجعة</span>
                                                                        {(() => {
                                                                            const reviewItem = session.review;
                                                                            return reviewItem ? (
                                                                            <div className="flex justify-between bg-white px-3 py-2 rounded-xl border border-slate-100">
                                                                                <span className="font-bold text-slate-700 font-mono">{reviewItem.raw}</span>
                                                                                <div className="flex items-center gap-1.5">
                                                                                    <span className="bg-purple-50 text-purple-700 border border-purple-100/80 px-2.5 py-1 rounded-lg text-xs font-black font-mono whitespace-nowrap">
                                                                                        {getReviewPagesForSession(session).toFixed(1)} ص
                                                                                    </span>
                                                                                    {reviewItem.grade && (
                                                                                        <span className={`px-2.5 py-1 rounded-lg text-xs font-bold whitespace-nowrap ${getGradePillClass(reviewItem.grade)}`}>
                                                                                            {reviewItem.grade}
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                            </div>
                                                                            ) : (
                                                                            <span className="text-slate-400 italic">لا مراجعة في الجلسة</span>
                                                                            );
                                                                        })()}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>

                                    </div>

                                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end items-center">
                                        <button 
                                            onClick={() => setSelectedStudent(null)}
                                            className="px-5 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-xs font-bold transition-all"
                                        >
                                            إغلاق النافذة
                                        </button>
                                    </div>

                                </div>
                            </div>
                        );
                    })()}

                    {/* --- MODAL 2: ADD NEW SESSION FORM --- */}
                    {showAddSessionModal && (
                        <div className="fixed inset-0 z-50 overflow-y-auto bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <form 
                                onSubmit={handleAddSessionSubmit} 
                                className="bg-white rounded-[2rem] max-w-xl w-full shadow-2xl border border-slate-100 overflow-hidden transform transition-all animate-in zoom-in-95 duration-200"
                            >
                                
                                <div className="p-6 bg-indigo-600 text-white flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-black">تسجيل جلسة تسميع وحفظ</h3>
                                        <p className="text-xs text-indigo-200 mt-1">تحديث إنجاز الطلاب ومراجعاتهم الفورية</p>
                                    </div>
                                    <button 
                                        type="button"
                                        onClick={() => setShowAddSessionModal(false)}
                                        className="p-1.5 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-colors"
                                    >
                                        <X size={18} />
                                    </button>
                                </div>

                                <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
                                    
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-600">اختر الطالب المعني:</label>
                                        <select
                                            required
                                            value={formStudentId}
                                            onChange={(e) => setFormStudentId(e.target.value)}
                                            className="w-full p-3 rounded-xl border border-slate-200 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500"
                                        >
                                            <option value="">-- اختر طالب من الحلقة --</option>
                                            {data.students?.map(s => (
                                                <option key={s.id} value={s.id}>{s.name} ({s.group || s.level})</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-600">تاريخ الجلسة التسميعية:</label>
                                        <input 
                                            type="date" 
                                            required
                                            value={formDate}
                                            onChange={(e) => setFormDate(e.target.value)}
                                            className="w-full p-3 rounded-xl border border-slate-200 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                        />
                                    </div>

                                    <div className="border-t border-slate-100 pt-4 space-y-3">
                                        <h4 className="text-xs font-black text-indigo-600 uppercase tracking-wider">القسم الأول: الحفظ الجديد</h4>
                                        
                                        <div className="grid grid-cols-3 gap-3">
                                            <div className="col-span-2 space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400">الصفحات (مثال: 301-305)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="301-305"
                                                    value={formNewRaw}
                                                    onChange={(e) => setFormNewRaw(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                                />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400">عدد الصفحات</label>
                                                <input 
                                                    type="number" 
                                                    step="0.5"
                                                    placeholder="5"
                                                    value={formNewPages}
                                                    onChange={(e) => setFormNewPages(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400">التقدير / الدرجة</label>
                                            <select
                                                value={formNewGrade}
                                                onChange={(e) => setFormNewGrade(e.target.value)}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                            >
                                                <option value="ممتاز">ممتاز</option>
                                                <option value="جيد جدًا">جيد جدًا</option>
                                                <option value="جيد">جيد</option>
                                                <option value="مقبول">مقبول</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="border-t border-slate-100 pt-4 space-y-3">
                                        <h4 className="text-xs font-black text-sky-600 uppercase tracking-wider">القسم الثاني: مراجعة القديم</h4>
                                        
                                        <div className="grid grid-cols-3 gap-3">
                                            <div className="col-span-2 space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400">الصفحات (مثال: 10-25)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="10-25"
                                                    value={formReviewRaw}
                                                    onChange={(e) => setFormReviewRaw(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                                />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400">عدد الصفحات</label>
                                                <input 
                                                    type="number" 
                                                    step="0.5"
                                                    placeholder="15"
                                                    value={formReviewPages}
                                                    onChange={(e) => setFormReviewPages(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400">التقدير / الدرجة</label>
                                            <select
                                                value={formReviewGrade}
                                                onChange={(e) => setFormReviewGrade(e.target.value)}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-indigo-100"
                                            >
                                                <option value="ممتاز">ممتاز</option>
                                                <option value="جيد جدًا">جيد جدًا</option>
                                                <option value="جيد">جيد</option>
                                                <option value="مقبول">مقبول</option>
                                            </select>
                                        </div>
                                    </div>

                                </div>

                                <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                                    <button 
                                        type="button"
                                        onClick={() => setShowAddSessionModal(false)}
                                        className="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-800 transition-colors"
                                    >
                                        إلغاء الأمر
                                    </button>

                                    <button 
                                        type="submit"
                                        className="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-md shadow-indigo-100 transition-all"
                                    >
                                        حفظ وتسجيل الجلسة
                                    </button>
                                </div>

                            </form>
                        </div>
                    )}

                    {/* --- MODAL 3: ADD NEW STUDENT FORM --- */}
                    {showAddStudentModal && (
                        <div className="fixed inset-0 z-50 overflow-y-auto bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <form 
                                onSubmit={handleAddStudentSubmit} 
                                className="bg-white rounded-[2rem] max-w-md w-full shadow-2xl border border-slate-100 overflow-hidden transform transition-all animate-in zoom-in-95 duration-200"
                            >
                                
                                <div className="p-6 bg-emerald-600 text-white flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-black">إضافة طالب جديد</h3>
                                        <p className="text-xs text-emerald-200 mt-1">توسيع سجلات المتابعة وإشراك طلاب جدد بالحلقة</p>
                                    </div>
                                    <button 
                                        type="button"
                                        onClick={() => setShowAddStudentModal(false)}
                                        className="p-1.5 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-colors"
                                    >
                                        <X size={18} />
                                    </button>
                                </div>

                                <div className="p-6 space-y-4">
                                    
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-600">اسم الطالب كاملاً:</label>
                                        <input 
                                            type="text" 
                                            required
                                            placeholder="مثال: يوسف أحمد الفياض"
                                            value={newStudentName}
                                            onChange={(e) => setNewStudentName(e.target.value)}
                                            className="w-full p-3 rounded-xl border border-slate-200 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-emerald-100 focus:border-emerald-500"
                                        />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-600">المجموعة / الحلقة الدراسية:</label>
                                        <select
                                            value={newStudentGroup}
                                            onChange={(e) => setNewStudentGroup(e.target.value)}
                                            className="w-full p-3 rounded-xl border border-slate-200 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-emerald-100"
                                        >
                                            <option value="نخبة١">نخبة١ (الهدف: 8 صفحات/أسبوع)</option>
                                            <option value="نخبة٢">نخبة٢ (الهدف: 4 صفحات/أسبوع)</option>
                                        </select>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-600">معدل حضور البدء (تلقائي):</label>
                                        <input 
                                            type="text"
                                            value={newStudentAttendance}
                                            onChange={(e) => setNewStudentAttendance(e.target.value)}
                                            placeholder="حضر 1 / 27"
                                            className="w-full p-3 rounded-xl border border-slate-100 bg-slate-50 text-xs text-slate-500 font-bold focus:outline-none cursor-not-allowed"
                                        />
                                    </div>

                                </div>

                                <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                                    <button 
                                        type="button"
                                        onClick={() => setShowAddStudentModal(false)}
                                        className="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-800 transition-colors"
                                    >
                                        إلغاء
                                    </button>

                                    <button 
                                        type="submit"
                                        className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold shadow-md shadow-emerald-100 transition-all"
                                    >
                                        إضافة الطالب لقاعدة البيانات
                                    </button>
                                </div>

                            </form>
                        </div>
                    )}

                </div>
            );
        }

        // --- INJECTING APP DOM ROOT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
